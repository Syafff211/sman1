<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - X-5 SMAN 1 Purbalingga</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="loadingScreen" class="loading-page"><div class="spinner"></div><p class="text-muted">Memuat Dashboard...</p></div>
  <div id="appContent" class="hidden">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">🎓</div>
        <div><div class="font-bold text-sm">X-5 SMAN 1</div><div class="text-xs text-muted">Dashboard Siswa</div></div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-user">
        <div class="flex items-center gap-3 mb-3">
          <div style="width:36px;height:36px;border-radius:50%;background:rgba(99,102,241,0.2);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--primary)" id="userAvatar">S</div>
          <div style="flex:1;min-width:0"><div class="text-sm font-medium truncate" id="userName">Siswa</div><div class="text-xs text-muted">Siswa</div></div>
        </div>
        <button class="btn btn-outline btn-sm w-full" onclick="logout()">🚪 Logout</button>
      </div>
    </aside>
    <div class="main-content">
      <header class="main-header">
        <div class="flex items-center gap-3">
          <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
          <h1 class="text-lg font-bold" id="pageTitle">Dashboard</h1>
        </div>
      </header>
      <main class="main-body" id="mainContent"></main>
    </div>
  </div>
  <div id="modalContainer"></div>
  <div class="toast-container" id="toasts"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/student-app.js"></script>
</body>
</html>
