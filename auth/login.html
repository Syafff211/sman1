<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Siswa - X-5 SMAN 1 Purbalingga</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-page">
    <div style="position:absolute;inset:0;pointer-events:none;z-index:0">
      <div style="position:absolute;top:25%;left:25%;width:400px;height:400px;background:rgba(99,102,241,0.08);border-radius:50%;filter:blur(100px)"></div>
      <div style="position:absolute;bottom:25%;right:25%;width:400px;height:400px;background:rgba(168,85,247,0.08);border-radius:50%;filter:blur(100px)"></div>
    </div>
    <div class="auth-card card" style="position:relative;z-index:1">
      <div class="text-center mb-6">
        <div class="auth-icon" style="background:linear-gradient(135deg,var(--primary),#a855f7)">🎓</div>
        <h1 class="text-xl font-bold">Login Siswa</h1>
        <p class="text-sm text-muted mt-1">Masuk ke dashboard kelas X-5</p>
      </div>
      <form id="loginForm" class="flex flex-col gap-4">
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="nama@email.com" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full" id="loginBtn">
          🎓 Masuk
        </button>
      </form>
      <div class="text-center mt-4" style="display:flex;flex-direction:column;gap:8px">
        <a href="/auth/admin.html" class="text-sm text-muted" style="display:block">Login sebagai Admin →</a>
        <a href="/" class="text-sm text-muted" style="display:block">← Kembali ke halaman utama</a>
      </div>
    </div>
  </div>
  <div class="toast-container" id="toasts"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:2px"></span> Memproses...';
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        
        // Force set role to student
        await supabase.from('profiles').update({ role: 'student' }).eq('user_id', data.user.id);
        
        showToast('Login berhasil! Selamat datang.', 'success');
        setTimeout(() => { window.location.href = '/dashboard/'; }, 500);
      } catch (err) {
        showToast(err.message || 'Login gagal. Periksa email dan password.', 'error');
        btn.disabled = false;
        btn.innerHTML = '🎓 Masuk';
      }
    });
  </script>
</body>
</html>
